name: Deploy main to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy main
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build site
        env:
          BASE_PATH: ${{ format('{0}/', steps.pages.outputs.base_path) }}
        run: bun run build

      - name: Update Pages state branch
        env:
          ARTIFACT_DIR: ${{ runner.temp }}/pages-artifact
          PAGES_DIR: ${{ runner.temp }}/gh-pages
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages:gh-pages
            git worktree add "$PAGES_DIR" gh-pages
          else
            git worktree add --detach "$PAGES_DIR"
            git -C "$PAGES_DIR" checkout --orphan gh-pages
            git -C "$PAGES_DIR" rm -rf . >/dev/null 2>&1 || true
            find "$PAGES_DIR" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          fi

          find "$PAGES_DIR" -mindepth 1 -maxdepth 1 ! -name .git ! -name pull -exec rm -rf {} +
          cp -a browser-dist/. "$PAGES_DIR/"
          touch "$PAGES_DIR/.nojekyll"

          git -C "$PAGES_DIR" add -A
          if git -C "$PAGES_DIR" diff --cached --quiet; then
            echo "No GitHub Pages changes to publish."
          else
            git -C "$PAGES_DIR" commit -m "Deploy main to GitHub Pages"
            git -C "$PAGES_DIR" push origin HEAD:gh-pages
          fi

          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR"
          cp -a "$PAGES_DIR"/. "$ARTIFACT_DIR"/
          rm -f "$ARTIFACT_DIR/.git"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ runner.temp }}/pages-artifact

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
