name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Type check
        run: bun run typecheck

      - name: Run unit tests
        run: bun run test:unit

  playwright:
    name: Playwright (${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
      options: --ipc=host
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Playwright tests
        run: bun run test:e2e -- --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

  checks:
    name: CI
    runs-on: ubuntu-latest
    needs:
      - static-checks
      - playwright
    if: ${{ always() }}

    steps:
      - name: Check job results
        run: |
          [[ "${{ needs.static-checks.result }}" == "success" ]]
          [[ "${{ needs.playwright.result }}" == "success" ]]
